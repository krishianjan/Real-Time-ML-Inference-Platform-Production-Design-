apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: inference-service
  template:
    metadata:
      labels:
        app: inference-service
    spec:
      containers:
      - name: inference
        image: inference-service:latest
        ports:
        - containerPort: 8080
        env:
        - name: MODEL_STORE_PATH
          value: "/models"
        resources:
          limits:
            nvidia.com/gpu: 1
        readinessProbe:
          httpGet:
            path: /ping
            port: 8080
          initialDelaySeconds: 30
        livenessProbe:
          httpGet:
            path: /ping
            port: 8080
          initialDelaySeconds: 60