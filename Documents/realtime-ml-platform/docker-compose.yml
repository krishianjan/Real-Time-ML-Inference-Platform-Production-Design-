version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"

  ingestion:
    build:
      context: .
      dockerfile: docker/ingestion.Dockerfile
    depends_on:
      - kafka
      - redis
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
    volumes:
      - ./src:/app/src
    command: python -m src.ingestion.consumer

    inference:
    build:
      context: .
      dockerfile: docker/inference.Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
      - "8082:8082"
    environment:
      MODEL_STORE_PATH: /home/model-server/model-store
    volumes:
      - ./src/inference/model_store:/home/model-server/model-store
      - ./src/inference/handler.py:/home/model-server/handler.py
      - ./config.properties:/home/model-server/config.properties
    command: >
      sh -c "
        cd /home/model-server/model-store &&
        python train_dummy_model.py &&
        torch-model-archiver --model-name dummy_model --version 1.0 --serialized-file model.pt --handler /home/model-server/handler.py --export-path . --force &&
        torchserve --start --model-store /home/model-server/model-store --models dummy_model=dummy_model.mar --ts-config /home/model-server/config.properties --foreground
      "
  prometheus:
    image: prom/prometheus:v2.54.0
    ports:
      - "9090:9090"
    volumes:
      - ./src/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    volumes:
      - ./src/monitoring/dashboards:/var/lib/grafana/dashboards
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin